<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nick generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0b1120 0%, #1a243b 50%, #0c1425 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }
        
        /* СНЕГОПАД */
        .snow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }
        
        .snowflake {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            user-select: none;
            font-size: 1.4rem;
            top: -20px;
            animation: snowfall linear infinite;
            text-shadow: 0 0 20px white;
            filter: blur(0.3px);
        }
        
        @keyframes snowfall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0.2; }
        }
        
        /* СУГРОБЫ */
        .snowdrift {
            position: absolute;
            bottom: 0;
            left: -10%;
            width: 120%;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            filter: blur(15px);
            border-radius: 50%;
            z-index: 3;
            box-shadow: 0 -20px 40px rgba(255, 255, 255, 0.2);
        }
        
        .snowdrift::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 5%;
            width: 90%;
            height: 25px;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(10px);
            border-radius: 50%;
        }
        
        .snowdrift2 {
            position: absolute;
            bottom: -10px;
            right: -5%;
            width: 80%;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            filter: blur(12px);
            border-radius: 50%;
            z-index: 3;
        }
        
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(8, 15, 28, 0.65);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            padding: 30px 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 100px rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 10;
            animation: softGlow 6s infinite alternate;
        }
        
        @keyframes softGlow {
            0% { box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 60px rgba(255,255,255,0.2); }
            100% { box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 120px rgba(255,255,255,0.4); }
        }
        
        h1 {
            text-align: center;
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 3px;
            text-shadow: 0 0 30px white, 0 5px 15px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #ffffff, #d4eaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-break: break-word;
        }
        
        .nick-box {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 25px 20px;
            margin: 25px 0;
            text-align: center;
            font-size: 30px;
            font-weight: 600;
            color: white;
            word-break: break-word;
            white-space: normal;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.2), 0 10px 25px rgba(0,0,0,0.5);
            text-transform: none;
            letter-spacing: 1px;
            line-height: 1.4;
            text-shadow: 0 2px 5px black;
            backdrop-filter: blur(5px);
        }
        
        .btn {
            width: 100%;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 50px;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            text-shadow: 0 2px 5px black;
            letter-spacing: 2px;
        }
        
        .btn:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn-copy {
            background: rgba(180, 210, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .year-badge {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.9;
            text-shadow: 0 0 15px white;
            letter-spacing: 1px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- ПЛОТНЫЙ СНЕГОПАД -->
    <div class="snow" id="snow-container"></div>
    
    <!-- СУГРОБЫ -->
    <div class="snowdrift"></div>
    <div class="snowdrift2"></div>

    <div class="container">
        <h1>nick generator</h1>
        
        <div class="year-badge" id="yearDisplay">🎲 random year 2009-2020</div>
        
        <div class="nick-box" id="nickDisplay">FlickDragonStar2009</div>
        
        <button class="btn" id="generateBtn">generate</button>
        <button class="btn btn-copy" id="copyBtn">copy</button>
    </div>

    <script>
        // ==================== СНЕГОПАД ====================
        function createSnowstorm() {
            const container = document.getElementById('snow-container');
            const count = 70;
            
            for (let i = 0; i < count; i++) {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                
                const symbols = ['❄️', '❄️', '❄️', '❄️', '✨', '❄️', '❄️', '❄️', '❄️'];
                snowflake.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.animationDuration = (Math.random() * 7 + 5) + 's';
                snowflake.style.fontSize = (Math.random() * 2.5 + 0.8) + 'rem';
                snowflake.style.opacity = Math.random() * 0.8 + 0.3;
                snowflake.style.animationDelay = Math.random() * -15 + 's';
                container.appendChild(snowflake);
            }
        }

        // ==================== СЛОВА ====================
        const first = [
            "Flick", "Dark", "Light", "Fire", "Ice", "Blue", "Red", "Gold", "Silver",
            "Blazing", "Frozen", "Burning", "Flying", "Hidden", "Mystic", "Super",
            "Ultra", "Mega", "Hyper", "Cool", "Epic", "Legend", "Rapid", "Shadow",
            "Silent", "Swift", "Wild", "Crazy", "Magic", "Iron", "Thunder", "Storm",
            "Wind", "Rock", "Star", "Moon", "Sun", "Spirit", "Electric", "Atomic",
            "Cosmic", "Galaxy", "Neon", "Cyber", "Pixel", "Frost", "Flame", "Aqua",
            "Terra", "Crystal", "Royal", "Winter", "Snow", "Arctic", "Glacier",
            "Polar", "Nordic", "Frostbite", "Snowflake", "Blizzard", "Hail", "Sleet",
            "Rime", "Hoarfrost", "Chill", "Freeze", "Cold", "Icy", "Frigid", "Bitter"
        ];
        
        const second = [
            "Dragon", "Tiger", "Wolf", "Fox", "Bear", "Lion", "Eagle", "Hawk",
            "Shark", "Whale", "Panda", "Monkey", "Zebra", "Giraffe", "Deer",
            "Rabbit", "Phoenix", "Snake", "Crocodile", "Turtle", "Panther",
            "Falcon", "Raven", "Leopard", "Cheetah", "Rhino", "Hippo", "Elephant",
            "Gorilla", "Koala", "Kangaroo", "Owl", "Lynx", "Mammoth", "Dinosaur",
            "Cobra", "Lizard", "Bat", "Spider", "Scorpion", "Griffin", "Pegasus",
            "Hydra", "Cerberus", "Yeti", "Penguin", "Seal", "Walrus", "PolarBear",
            "ArcticFox", "SnowLeopard", "WhiteWolf", "Reindeer", "Moose", "Husky",
            "Malamute", "SnowyOwl", "Puffin", "Narwhal", "Beluga", "Orca", "IceDragon"
        ];
        
        const third = [
            "Star", "Moon", "Sun", "Cloud", "Storm", "Wind", "Fire", "Water",
            "Thunder", "Lightning", "Shadow", "Night", "Day", "World", "Land",
            "King", "Queen", "Prince", "Princess", "Warrior", "Knight", "Ninja",
            "Samurai", "Hunter", "Slayer", "Master", "Lord", "Boss", "Champion",
            "Hero", "Legend", "Ruler", "Guardian", "Wizard", "Mage", "Sorcerer",
            "Warlock", "Paladin", "Rogue", "Assassin", "Druid", "Shaman", "Emperor",
            "Phantom", "Ghost", "Spirit", "Angel", "Demon", "Snowflake", "Blizzard",
            "Avalanche", "Iceberg", "Glacier", "Frost", "Winter", "Snowstorm",
            "Snowfall", "Powder", "Crystal", "Flurry", "Squall", "Tempest", "Gale"
        ];

        // ==================== НАСТРОЙКИ ====================
        let generatedNicks = new Set();

        function capitalizeFirst(string) {
            return string.charAt(0).toUpperCase() + string.slice(1);
        }

        function getRandomYear() {
            return Math.floor(Math.random() * (2020 - 2009 + 1) + 2009).toString();
        }

        function generateUniqueNick() {
            const maxAttempts = 1000;
            
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                let word1 = capitalizeFirst(first[Math.floor(Math.random() * first.length)]);
                let word2 = capitalizeFirst(second[Math.floor(Math.random() * second.length)]);
                let word3 = capitalizeFirst(third[Math.floor(Math.random() * third.length)]);
                let year = getRandomYear();
                
                let nick = word1 + word2 + word3 + year;
                
                if (!generatedNicks.has(nick)) {
                    generatedNicks.add(nick);
                    return nick;
                }
            }
            
            let word1 = capitalizeFirst(first[Math.floor(Math.random() * first.length)]);
            let word2 = capitalizeFirst(second[Math.floor(Math.random() * second.length)]);
            let word3 = capitalizeFirst(third[Math.floor(Math.random() * third.length)]);
            let year = getRandomYear();
            let suffix = Math.floor(Math.random() * 100);
            let nick = word1 + word2 + word3 + year + suffix;
            generatedNicks.add(nick);
            return nick;
        }

        function updateDisplay() {
            const newNick = generateUniqueNick();
            document.getElementById('nickDisplay').innerHTML = newNick;
            document.getElementById('yearDisplay').innerHTML = `🎲 random year 2009-2020`;
        }

        function copyNick() {
            const nick = document.getElementById('nickDisplay').innerHTML;
            navigator.clipboard.writeText(nick).then(() => {
                alert('✅ copied: ' + nick);
            }).catch(() => {
                alert('❌ select and copy manually');
            });
        }

        window.onload = function() {
            createSnowstorm();
            document.getElementById('generateBtn').onclick = updateDisplay;
            document.getElementById('copyBtn').onclick = copyNick;
            updateDisplay();
        };
    </script>
</body>
</html>
